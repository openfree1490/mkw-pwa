<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#020408" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MKW" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>MKW Command Center</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%; width: 100%;
        background: #020408; color: #b8c4d8;
        overflow: hidden;
        font-family: 'Rajdhani', sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-font-smoothing: antialiased;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #080d16; }
      ::-webkit-scrollbar-thumb { background: #1b2a40; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #243856; }
      /* Scanline overlay */
      #root::after {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.015) 2px,
          rgba(0, 255, 136, 0.015) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
      /* Selection */
      ::selection { background: rgba(0, 204, 255, 0.3); color: #fff; }
      /* Smooth scrolling */
      * { scroll-behavior: smooth; }
      /* Pulsing animation */
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
